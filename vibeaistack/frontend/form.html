<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Health Navigator</title>

  <style>
    body {
      font-family: system-ui;
      background: #0d0d0d;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    h1 { margin-bottom: 20px; }

    .form {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, textarea, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #1c1c1c;
      color: white;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      cursor: pointer;
      font-weight: bold;
    }

    #result {
      margin-top: 25px;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .group-title {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card {
      background: #1c1c1c;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 6px;
    }

    .tags {
      font-size: 12px;
      opacity: 0.6;
    }

    .empty {
      opacity: 0.6;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🧭 Health Navigator</h1>

<div class="form">
  <input id="problem" placeholder="What is your main issue?" />
  <input id="duration" placeholder="How long has this been happening?" />

  <select id="severity">
    <option value="">Severity</option>
    <option>mild</option>
    <option>moderate</option>
    <option>severe</option>
  </select>

  <input id="age" placeholder="Age (optional)" />
  <textarea id="notes" placeholder="Additional notes..."></textarea>

  <button onclick="submitForm()">Find Services</button>
</div>

<div id="result"></div>

<script>
async function submitForm() {
  const data = {
    problem: problem.value,
    duration: duration.value,
    severity: severity.value,
    age: age.value,
    notes: notes.value
  };

  const res = await fetch("http://localhost:3000/assess", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  const container = document.getElementById("result");

  let summary = "";
  let groups = null;

  // ─────────────────────────────
  // CASE 1: backend already structured
  // ─────────────────────────────
  if (result.summary && result.groups) {
    summary = result.summary;
    groups = result.groups;
  }

  // ─────────────────────────────
  // CASE 2: AI returned hybrid text (summary + JSON)
  // ─────────────────────────────
  else {
    const raw = result.answer || "";

    // extract JSON block
    const jsonMatch = raw.match(/\{[\s\S]*\}/);

    if (jsonMatch) {
      try {
        const parsed = JSON.parse(jsonMatch[0]);
        groups = parsed.groups;
        summary = parsed.summary || "";
      } catch (e) {
        console.error("JSON parse failed:", e);
      }
    }

    // fallback summary (everything before JSON)
    if (!summary) {
      summary = raw.split("{")[0].trim();
    }
  }

  // ─────────────────────────────
  // RENDER UI
  // ─────────────────────────────
  let html = "";

  // summary box
  if (summary) {
    html += `
      <div class="card">
        <div class="name">🧭 Summary</div>
        <div class="meta">${summary}</div>
      </div>
    `;
  }

  if (!groups) {
    html += `<div class="card">No structured results found.</div>`;
    container.innerHTML = html;
    return;
  }

  // render grouped services
  const groupNames = {
    medical: "🏥 Medical",
    mental_health: "🧠 Mental Health",
    social_support: "🤝 Social Support",
    emergency: "🚨 Emergency"
  };

  for (const key in groups) {
    const items = groups[key];
    if (!items || items.length === 0) continue;

    html += `<div class="group-title">${groupNames[key] || key}</div>`;

    items.forEach(s => {
      html += `
        <div class="card">
          <div class="name">${s.name || "Unknown service"}</div>
          <div class="meta">${s.address || ""}</div>
          <div class="meta">${s.hours || ""}</div>
          <div class="meta">${s.specialty || ""}</div>
          <div class="tags">${(s.tags || []).join(", ")}</div>
          <div class="meta">💡 ${s.reason || ""}</div>
        </div>
      `;
    });
  }

  container.innerHTML = html;
}
</script>

</body>
</html>
